<!--
  ============================================================
  经典贪吃蛇游戏 (Snake Game)
  ============================================================
  - 游戏区域：20×20 的网格，画布大小 400×400 像素
  - 操作方式：键盘方向键（上/下/左/右）控制蛇的移动方向
  - 胜利条件：蛇填满整个棋盘（400 格）即为完美通关
  - 失败条件：蛇头撞到边界或自身则游戏结束
  - 技术实现：纯 HTML + CSS + Canvas，无外部依赖
  ============================================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>贪吃蛇 | 经典小游戏</title>
  <style>
    /* 全局禁用文字选中，避免游戏中误选文本 */
    * {
      user-select: none;
    }

    /* 页面主体：深绿色渐变背景，flex 水平垂直居中 */
    body {
      background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%); /* 深绿渐变 */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Press Start 2P', 'Courier New', monospace;
      margin: 0;
      padding: 20px;
    }

    /* 游戏卡片容器：深色圆角卡片，内含画布和信息面板 */
    .game-container {
      background: #1e2a1c;
      border-radius: 48px;
      padding: 24px 28px 28px 28px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.1);
    }

    /* 画布区域 */
    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 24px;
      box-shadow: 0 0 0 6px #2b3b28, 0 12px 28px black;
      background-color: #0f1a0e;
      cursor: pointer;
    }

    /* 信息面板 */
    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 20px;
      margin-bottom: 12px;
      background: #0e1a0c;
      padding: 12px 20px;
      border-radius: 60px;
      backdrop-filter: blur(2px);
    }

    /* 分数数字显示框：黑色背景、绿色文字、等宽字体 */
    .score-box {
      background: black;
      padding: 6px 18px;
      border-radius: 32px;
      color: #b9f6ca;
      font-weight: bold;
      font-size: 28px;
      letter-spacing: 2px;
      font-family: monospace;
      box-shadow: inset 0 0 5px #3e6b3a, 0 2px 4px rgba(0,0,0,0.3);
    }

    /* 分数标签文字样式 */
    .score-label {
      color: #c0e0b0;
      font-size: 16px;
      font-weight: bold;
      margin-right: 12px;
      text-shadow: 0 1px 0 #0a2f0a;
    }

    /* 重新开始按钮：橙色圆角按钮，带底部阴影模拟立体按键效果 */
    .restart-btn {
      background: #ffb347;
      border: none;
      font-size: 18px;
      font-weight: bold;
      font-family: inherit;
      padding: 6px 20px;
      border-radius: 60px;
      color: #2a2e1e;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 5px 0 #a1581a;
      transform: translateY(-2px);
    }

    /* 按钮按下状态：位移+阴影缩小，模拟物理按压反馈 */
    .restart-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #a1581a;
    }

    /* 游戏状态文字：半透明黑色背景，显示"游戏中"/"游戏结束"等状态 */
    .status {
      background: #00000066;
      padding: 5px 16px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      color: #f3ffc2;
      backdrop-filter: blur(4px);
    }

    /* 操作提示：居中显示方向键提示信息 */
    .controls-tip {
      text-align: center;
      margin-top: 18px;
      color: #b9d2a4;
      font-size: 13px;
      background: #0c190b70;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 500;
    }

    /* 脉冲动画：用于状态文字的呼吸闪烁效果（透明度在 0.7~1 之间变化） */
    @keyframes pulse {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
<!-- 外层包裹容器 -->
<div>
  <!-- 游戏主容器卡片，包含画布和信息面板 -->
  <div class="game-container">
    <!-- 游戏画布：20x20 网格，每格 20px，总 400x400 像素 -->
    <canvas id="snakeCanvas" width="400" height="400"></canvas>

    <!-- 信息面板：显示分数和重新开始按钮 -->
    <div class="info-panel">
      <div>
        <!-- 分数标签 -->
        <span class="score-label">🐍 SCORE</span>
        <!-- 当前分数数字 -->
        <span class="score-box" id="scoreDisplay">0</span>
      </div>
      <!-- 重新开始按钮 -->
      <button class="restart-btn" id="restartButton">🍎 新的一局</button>
    </div>
    <!-- 底部栏：左侧游戏状态 + 右侧操作提示 -->
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <!-- 游戏状态文字（游戏中 / 游戏结束 / 完美通关等） -->
      <div class="status" id="gameStatusText">▶ 游戏中</div>
      <!-- 方向键操作提示 -->
      <div class="controls-tip">⬆ ⬇ ⬅ ➡  方向键控制</div>
    </div>
  </div>
</div>

<script>
  /* ============================================================
     贪吃蛇游戏核心逻辑（立即执行函数 IIFE，避免全局污染）
     ============================================================ */
  (function(){
    // ==================== 游戏配置常量 ====================
    // BOARD_SIZE: 棋盘每行/列的格子数（20×20 = 400 格）
    // CELL_SIZE:  每个格子的像素尺寸
    // TICK_INTERVAL_MS: 蛇每次移动的时间间隔（毫秒），值越小游戏越快
    const BOARD_SIZE = 20;      // 20x20 网格
    const CELL_SIZE = 20;       // 像素
    const TICK_INTERVAL_MS = 150;  // 移动间隔(ms)

    // ==================== DOM 元素引用 ====================
    // canvas: 游戏画布对象，所有图形都绘制在上面
    // ctx:    2D 绘图上下文，调用绘图 API 的入口
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const statusSpan = document.getElementById('gameStatusText');

    // ==================== 游戏状态变量 ====================
    // snake:         蛇身体坐标数组，索引 0 为蛇头，每个元素 {x, y}
    // food:          当前食物坐标 {x, y}
    // direction:     当前实际移动方向（RIGHT/LEFT/UP/DOWN）
    // nextDirection: 玩家按键后暂存的下一方向（防止一帧内多次反向）
    // score:         当前得分（每吃一个食物 +1）
    // gameLoop:      setInterval 返回的定时器 ID，用于停止游戏循环
    // isGameRunning: 游戏运行标志，true=运行中 / false=已结束
    let snake = [];          // 坐标数组 {x, y}
    let food = { x: 12, y: 10 };
    let direction = 'RIGHT';    // 当前移动方向
    let nextDirection = 'RIGHT';
    let score = 0;
    let gameLoop = null;
    let isGameRunning = true;    // true: 运行中 / false: 结束

    // ==================== 初始化游戏 ====================
    // 将蛇重置为初始 3 格（水平放置于棋盘中央），方向朝右
    // 重置分数和运行状态，生成新食物，启动定时器循环
    function initGame() {
      // 蛇的初始结构: 3格，水平放置
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = 'RIGHT';
      nextDirection = 'RIGHT';
      score = 0;
      isGameRunning = true;
      updateScoreUI();
      statusSpan.innerText = '▶ 游戏中';
      statusSpan.style.color = '#c6ffb7';
      
      // 生成有效食物（避开蛇身）
      generateValidFood();
      
      // 清除之前的循环
      if (gameLoop) clearInterval(gameLoop);
      // 启动新循环
      gameLoop = setInterval(gameTick, TICK_INTERVAL_MS);
      
      // 立刻渲染画面
      drawGame();
    }

    // ==================== 生成食物 ====================
    // 随机生成食物坐标，确保不会与蛇身重叠
    // 算法：先随机尝试最多 3000 次（快速路径）
    //        若失败（蛇占了大部分格子），则遍历所有格子找到空位
    //        若蛇已占满全部格子，则触发胜利
    function generateValidFood() {
      const totalCells = BOARD_SIZE * BOARD_SIZE;
      if (snake.length >= totalCells) {
        // 胜利局面（蛇已满） —— 特殊处理，游戏胜利结束
        if(isGameRunning) {
          isGameRunning = false;
          if (gameLoop) clearInterval(gameLoop);
          statusSpan.innerText = '🎉 完美通关！胜利 🎉';
          statusSpan.style.color = '#ffd966';
        }
        return;
      }
      
      // 快速尝试有限次数，避免死循环
      let newFood = null;
      let maxAttempts = 3000;
      while (maxAttempts--) {
        const randX = Math.floor(Math.random() * BOARD_SIZE);
        const randY = Math.floor(Math.random() * BOARD_SIZE);
        if (!snake.some(segment => segment.x === randX && segment.y === randY)) {
          newFood = { x: randX, y: randY };
          break;
        }
      }
      // 极端情况: 几乎满了但仍有可能找到，如果没找到则遍历所有格子
      if (!newFood) {
        for (let i = 0; i < BOARD_SIZE; i++) {
          for (let j = 0; j < BOARD_SIZE; j++) {
            if (!snake.some(s => s.x === i && s.y === j)) {
              newFood = { x: i, y: j };
              break;
            }
          }
          if (newFood) break;
        }
      }
      food = newFood || { x: 5, y: 5 };
    }

    // 分数UI更新
    function updateScoreUI() {
      scoreSpan.innerText = score;
    }

    // ==================== 游戏结束处理 ====================
    // 参数 win: true 表示胜利（蛇填满棋盘），false 表示失败（撞墙/撞自己）
    // 停止定时器循环，更新状态文字和颜色，最后重绘一次画面（含半透明遮罩）
    function endGame(win = false) {
      if (!isGameRunning) return;
      isGameRunning = false;
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = null;
      if (win) {
        statusSpan.innerText = '🏆 恭喜获胜！重新开局 🏆';
        statusSpan.style.color = '#f9e45b';
      } else {
        statusSpan.innerText = '💀 游戏结束 点击重来 💀';
        statusSpan.style.color = '#ffae70';
      }
      drawGame();  // 最后绘制一次结束画面
    }

    // ==================== 蛇的移动逻辑（核心） ====================
    // 流程：
    //   1. 应用暂存方向 nextDirection，禁止 180 度掉头
    //   2. 根据方向计算新蛇头坐标
    //   3. 检测是否吃到食物
    //   4. 在蛇头前端插入新坐标（unshift），若未吃食物则移除尾部（pop）
    //   5. 碰撞检测：边界碰撞 + 自身碰撞
    function moveSnake() {
      if (!isGameRunning) return false;
      
      // 正式采用暂存的方向，防止一帧内多次反向
      let newDir = nextDirection;
      // 禁止 180 度掉头（如正在向右走时不能直接向左）
      if ((newDir === 'RIGHT' && direction === 'LEFT') ||
          (newDir === 'LEFT' && direction === 'RIGHT') ||
          (newDir === 'UP' && direction === 'DOWN') ||
          (newDir === 'DOWN' && direction === 'UP')) {
        newDir = direction;
      }
      direction = newDir;
      
      // 计算新头部
      let newHead = { ...snake[0] };
      switch (direction) {
        case 'RIGHT': newHead.x += 1; break;
        case 'LEFT':  newHead.x -= 1; break;
        case 'UP':    newHead.y -= 1; break;
        case 'DOWN':  newHead.y += 1; break;
        default: break;
      }
      
      // 检测新蛇头是否与食物坐标重合（即"吃到食物"）
      const willEat = (newHead.x === food.x && newHead.y === food.y);
      
      // 执行移动：先在数组头部插入新蛇头，再根据是否吃到食物决定是否删除尾部
      snake.unshift(newHead);
      if (!willEat) {
        snake.pop();
      } else {
        // 吃到了: 分数增加 + 生成新食物
        score++;
        updateScoreUI();
        generateValidFood();   // 重新生成食物
        
        // 胜利条件: 蛇的长度达到总格子数
        if (snake.length === BOARD_SIZE * BOARD_SIZE) {
          endGame(true);
          return false;
        }
      }
      
      // === 碰撞检测 ===
      const head = snake[0];
      // 边界碰撞
      if (head.x < 0 || head.x >= BOARD_SIZE || head.y < 0 || head.y >= BOARD_SIZE) {
        endGame(false);
        return false;
      }
      // 自身碰撞检测：从第 1 节开始遍历（跳过蛇头本身），检查蛇头是否与任意身体节重叠
      for (let i = 1; i < snake.length; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) {
          endGame(false);
          return false;
        }
      }
      
      return true;
    }
    
    // ==================== 主循环回调（定时器每 TICK_INTERVAL_MS 毫秒触发） ====================
    // 每次执行：移动蛇 -> 重绘画面
    function gameTick() {
      if (!isGameRunning) return;
      moveSnake();
      drawGame();
    }
    
    // ==================== 绘图模块 ====================
    // 使用 Canvas 2D API 渲染所有游戏元素：
    //   - 暗绿色网格背景线
    //   - 红色食物（带高光高亮效果）
    //   - 绿色渐变蛇身（蛇头颜色更亮）
    //   - 蛇头上的双眼（位置随移动方向变化）
    //   - 游戏结束时叠加半透明黑色遮罩 + 提示文字
    function drawGame() {
      if (!ctx) return;
      // 背景网格
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 绘制暗网格线
      ctx.strokeStyle = '#2a4522';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= BOARD_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.stroke();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
      }
      
      // --- 绘制食物（红色圆形 + 浅色高光 + 白色亮点，营造立体感） ---
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ff5252';
      ctx.beginPath();
      ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ff8a8a';
      ctx.beginPath();
      ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 1, food.y * CELL_SIZE + CELL_SIZE/2 - 1, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2 - 2, food.y * CELL_SIZE + CELL_SIZE/2 - 2, 1, 0, Math.PI*2);
      ctx.fill();
      
      // --- 绘制蛇（渐变绿色方块 + 蛇头双眼） ---
      // 遍历蛇身每一节，蛇头(i=0)用亮绿色渐变，身体用稍暗的绿色渐变
      for (let i = 0; i < snake.length; i++) {
        const seg = snake[i];
        const posX = seg.x * CELL_SIZE;
        const posY = seg.y * CELL_SIZE;
        const gradient = ctx.createLinearGradient(posX, posY, posX + CELL_SIZE, posY + CELL_SIZE);
        if (i === 0) {
          gradient.addColorStop(0, '#6eed5e');
          gradient.addColorStop(1, '#3fa82c');
        } else {
          gradient.addColorStop(0, '#4fbf3c');
          gradient.addColorStop(1, '#258f1a');
        }
        ctx.fillStyle = gradient;
        ctx.fillRect(posX + 1, posY + 1, CELL_SIZE - 2, CELL_SIZE - 2);
        // 蛇的眼睛
        if (i === 0) {
          ctx.fillStyle = '#ffffff';
          let eyeXOffset = (direction === 'RIGHT') ? CELL_SIZE - 6 : (direction === 'LEFT') ? 5 : CELL_SIZE/2 - 2;
          let eyeYOffset1 = CELL_SIZE/2 - 4;
          let eyeYOffset2 = CELL_SIZE/2 + 2;
          if (direction === 'UP' || direction === 'DOWN') {
            ctx.fillRect(posX + CELL_SIZE/2 - 5, (direction === 'UP') ? posY + 4 : posY + CELL_SIZE - 9, 3, 3);
            ctx.fillRect(posX + CELL_SIZE/2 + 2, (direction === 'UP') ? posY + 4 : posY + CELL_SIZE - 9, 3, 3);
          } else {
            ctx.fillRect((direction === 'RIGHT') ? posX + CELL_SIZE - 8 : posX + 5, posY + 5, 3, 3);
            ctx.fillRect((direction === 'RIGHT') ? posX + CELL_SIZE - 8 : posX + 5, posY + CELL_SIZE - 9, 3, 3);
          }
          ctx.fillStyle = '#000000';
          if (direction === 'UP' || direction === 'DOWN') {
            ctx.fillRect(posX + CELL_SIZE/2 - 4, (direction === 'UP') ? posY + 5 : posY + CELL_SIZE - 8, 2, 2);
            ctx.fillRect(posX + CELL_SIZE/2 + 3, (direction === 'UP') ? posY + 5 : posY + CELL_SIZE - 8, 2, 2);
          } else {
            ctx.fillRect((direction === 'RIGHT') ? posX + CELL_SIZE - 7 : posX + 6, posY + 6, 2, 2);
            ctx.fillRect((direction === 'RIGHT') ? posX + CELL_SIZE - 7 : posX + 6, posY + CELL_SIZE - 8, 2, 2);
          }
        }
      }
      
      // --- 游戏结束遮罩层 ---
      // 在画布上叠加半透明黑色遮罩，居中显示提示文字
      if (!isGameRunning) {
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 20px "Segoe UI", monospace';
        ctx.fillStyle = '#ffdd99';
        ctx.shadowBlur = 0;
        ctx.textAlign = 'center';
        ctx.fillText('⚡ 点击「新的一局」', canvas.width/2, canvas.height/2);
        ctx.font = '14px monospace';
        ctx.fillStyle = '#cbdcaa';
        ctx.fillText('press restart', canvas.width/2, canvas.height/2 + 32);
        ctx.textAlign = 'left';
      }
    }
    
    // ==================== 键盘事件处理 ====================
    // 监听方向键（ArrowUp/ArrowDown/ArrowLeft/ArrowRight）
    // 将玩家意图暂存到 nextDirection，在下一帧 moveSnake() 中才真正生效
    // 游戏结束时不再响应方向键输入
    function handleKeydown(e) {
      if (!isGameRunning) return;  // 游戏结束不再响应方向，但可以通过按钮重开
      const key = e.key;
      e.preventDefault();
      switch (key) {
        case 'ArrowUp':    nextDirection = 'UP'; break;
        case 'ArrowDown':  nextDirection = 'DOWN'; break;
        case 'ArrowLeft':  nextDirection = 'LEFT'; break;
        case 'ArrowRight': nextDirection = 'RIGHT'; break;
        default: return;
      }
    }
    
    // ==================== 重置并重新开始游戏 ====================
    // 清除当前定时器，调用 initGame() 进行完全重置
    // 由"新的一局"按钮的点击事件调用
    function resetAndRestart() {
      // 重置所有全局变量
      if (gameLoop) clearInterval(gameLoop);
      initGame();   // 全新对局
    }
    
    // ==================== 事件绑定与游戏启动 ====================
    // 页面加载完成后：
    //   1. 调用 initGame() 启动第一局游戏
    //   2. 绑定键盘方向键事件监听器
    //   3. 绑定"新的一局"按钮的点击事件
    window.addEventListener('load', () => {
      initGame();
      window.addEventListener('keydown', handleKeydown);
      const restartBtn = document.getElementById('restartButton');
      if (restartBtn) {
        restartBtn.addEventListener('click', () => {
          resetAndRestart();
        });
      }
    });
  })();
</script>
</body>
</html>
