<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星际战机 · 打怪兽</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #030b1a 0%, #07152a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            background: #0a1428;
            border-radius: 48px;
            padding: 20px 24px 24px 24px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 5px #2a3f6e, 0 12px 28px black;
            cursor: none;
            background-color: #010a18;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            margin-bottom: 10px;
            background: #0d1a2fcc;
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 60px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .score-card {
            background: #010a1a;
            padding: 6px 20px;
            border-radius: 40px;
            color: #f5d742;
            font-weight: bold;
            font-size: 26px;
            font-family: monospace;
            box-shadow: inset 0 0 6px #2e4a7a, 0 3px 6px rgba(0,0,0,0.4);
        }

        .hp-card {
            background: #1a1f2e;
            padding: 6px 18px;
            border-radius: 40px;
            color: #ff7e67;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hp-heart {
            font-size: 22px;
            letter-spacing: 2px;
        }

        button {
            background: #f5a623;
            border: none;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            padding: 6px 22px;
            border-radius: 40px;
            color: #1f2a1e;
            cursor: pointer;
            transition: all 0.1s linear;
            box-shadow: 0 5px 0 #9b5e1a;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #9b5e1a;
        }

        .status {
            background: #000000aa;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            color: #b8e2ff;
        }

        .tips {
            text-align: center;
            margin-top: 16px;
            color: #8daddb;
            font-size: 12px;
            background: #0b1422b3;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 5px 20px;
            border-radius: 60px;
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="550"></canvas>
        <div class="info-panel">
            <div class="score-card">
                💥 得分 <span id="scoreValue">0</span>
            </div>
            <div class="hp-card">
                <span>🛡️ 战机耐久</span>
                <span class="hp-heart" id="hpHearts">❤️❤️❤️</span>
            </div>
            <button id="restartGameBtn">✨ 重新起飞 ✨</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 6px;">
            <div class="status" id="gameStateMsg">🚀 移动鼠标 / 手指 控制战机</div>
            <div class="tips">🎮 鼠标移动 / 手指滑动 → 战机跟随 | 自动开火 🔫</div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- 飞机打怪兽 · 核心模块 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = true;
        let score = 0;
        let playerHP = 3;          // 初始3条命
        let invincibleFrames = 0;   // 无敌帧 (被击中后短暂无敌)
        
        // 战机参数
        const PLAYER_WIDTH = 40;
        const PLAYER_HEIGHT = 40;
        let playerX = canvas.width/2 - PLAYER_WIDTH/2;
        let playerY = canvas.height - 70;
        
        // 子弹系统
        let bullets = [];
        const BULLET_WIDTH = 6;
        const BULLET_HEIGHT = 12;
        const BULLET_SPEED = 7;
        let shootCooldown = 0;
        const SHOOT_DELAY_FRAMES = 6;   // 每6帧射一发 (自动连射)
        
        // 怪兽系统
        let monsters = [];
        const MONSTER_SIZE = 42;
        let monsterSpawnCounter = 0;
        const MONSTER_SPAWN_DELAY_FRAMES = 28;  // 生成间隔帧数
        let baseMonsterSpeed = 2.2;
        
        // 爆炸特效
        let explosions = [];
        
        // 鼠标/触摸位置控制 (支持移动端)
        let mouseX = playerX + PLAYER_WIDTH/2;
        let mouseY = playerY + PLAYER_HEIGHT/2;
        
        // UI 元素
        const scoreSpan = document.getElementById('scoreValue');
        const hpHeartsSpan = document.getElementById('hpHearts');
        const gameStateSpan = document.getElementById('gameStateMsg');
        const restartBtn = document.getElementById('restartGameBtn');
        
        // ---------- 辅助函数 ----------
        function updateUI() {
            scoreSpan.innerText = score;
            // 更新心形显示
            let heartStr = '';
            for(let i=0; i<playerHP; i++) heartStr += '❤️ ';
            for(let i=playerHP; i<3; i++) heartStr += '🖤 ';
            hpHeartsSpan.innerText = heartStr.trim() || '💀';
        }
        
        // 重置游戏
        function resetGame() {
            gameRunning = true;
            score = 0;
            playerHP = 3;
            invincibleFrames = 0;
            bullets = [];
            monsters = [];
            explosions = [];
            shootCooldown = 0;
            monsterSpawnCounter = 5;
            playerX = canvas.width/2 - PLAYER_WIDTH/2;
            playerY = canvas.height - 70;
            // 重置鼠标位置
            mouseX = playerX + PLAYER_WIDTH/2;
            mouseY = playerY + PLAYER_HEIGHT/2;
            updateUI();
            gameStateSpan.innerText = '🚀 战斗开始！击落怪兽！';
            gameStateSpan.style.color = '#b8e2ff';
        }
        
        // 生成新怪兽
        function spawnMonster() {
            let randX = Math.random() * (canvas.width - MONSTER_SIZE - 20) + 10;
            let monsterType = Math.floor(Math.random() * 3); // 0,1,2 不同颜色和分值
            let hp = 1;
            let pointValue = 10;
            let colorTheme = '#d64531';
            if(monsterType === 1) {
                pointValue = 20;
                colorTheme = '#aa5ae0';
                hp = 1;
            } else if(monsterType === 2) {
                pointValue = 30;
                colorTheme = '#3c9eff';
                hp = 2;   // 蓝色厚血怪 需要2次攻击
            } else {
                pointValue = 10;
                colorTheme = '#e35f3e';
                hp = 1;
            }
            monsters.push({
                x: randX,
                y: -MONSTER_SIZE,
                width: MONSTER_SIZE,
                height: MONSTER_SIZE,
                hp: hp,
                maxHp: hp,
                type: monsterType,
                color: colorTheme,
                points: pointValue,
                speedY: baseMonsterSpeed + Math.random() * 1.2
            });
        }
        
        // 添加爆炸特效
        function addExplosion(x, y) {
            explosions.push({ x: x, y: y, frames: 12 }); // 持续12帧
        }
        
        // 玩家受伤
        function damagePlayer() {
            if(!gameRunning) return;
            if(invincibleFrames > 0) return;
            playerHP--;
            updateUI();
            if(playerHP <= 0) {
                playerHP = 0;
                gameRunning = false;
                gameStateSpan.innerText = '💀 战机坠毁 · 点击重新起飞 💀';
                gameStateSpan.style.color = '#ffaa88';
                addExplosion(playerX + PLAYER_WIDTH/2, playerY + PLAYER_HEIGHT/2);
                return;
            }
            invincibleFrames = 30;  // 无敌约0.5秒 (60帧约0.5s)
            // 播放受伤闪烁特效
            gameStateSpan.innerText = '⚠️ 战机受损！短暂无敌 ⚠️';
            setTimeout(()=>{
                if(gameRunning) gameStateSpan.innerText = '🔥 继续攻击！ 🔥';
            }, 600);
        }
        
        // 更新逻辑
        function updateGame() {
            if(!gameRunning) return;
            
            // 无敌帧递减
            if(invincibleFrames > 0) invincibleFrames--;
            
            // 1. 战机跟随鼠标/手指 (边界限制)
            let targetX = mouseX - PLAYER_WIDTH/2;
            targetX = Math.min(Math.max(targetX, 5), canvas.width - PLAYER_WIDTH - 5);
            playerX = targetX;
            // Y轴可适当跟随但固定高度附近，但增加灵活感 (限制垂直范围)
            let targetY = mouseY - PLAYER_HEIGHT/2;
            targetY = Math.min(Math.max(targetY, canvas.height - 130), canvas.height - 70);
            playerY = targetY;
            
            // 2. 自动射击
            if(shootCooldown <= 0) {
                bullets.push({
                    x: playerX + PLAYER_WIDTH/2 - BULLET_WIDTH/2,
                    y: playerY - 8,
                    w: BULLET_WIDTH,
                    h: BULLET_HEIGHT,
                });
                shootCooldown = SHOOT_DELAY_FRAMES;
            } else {
                shootCooldown--;
            }
            
            // 子弹移动
            for(let i=0; i<bullets.length; i++) {
                bullets[i].y -= BULLET_SPEED;
                if(bullets[i].y + bullets[i].h < 0 || bullets[i].y > canvas.height) {
                    bullets.splice(i,1);
                    i--;
                }
            }
            
            // 怪兽移动 & 碰撞（边界删除）
            for(let i=0; i<monsters.length; i++) {
                let m = monsters[i];
                m.y += m.speedY;
                if(m.y > canvas.height + 100 || m.y + m.height < -100) {
                    monsters.splice(i,1);
                    i--;
                    continue;
                }
                // 怪兽与玩家碰撞检测 (矩形)
                if(invincibleFrames <= 0 && gameRunning) {
                    if(playerX < m.x + m.width && playerX + PLAYER_WIDTH > m.x &&
                       playerY < m.y + m.height && playerY + PLAYER_HEIGHT > m.y) {
                        damagePlayer();
                        addExplosion(m.x + m.width/2, m.y + m.height/2);
                        monsters.splice(i,1);
                        i--;
                        if(!gameRunning) break;
                        continue;
                    }
                }
            }
            
            if(!gameRunning) return;
            
            // 子弹 vs 怪兽碰撞 (带血量)
            for(let i=0; i<bullets.length; i++) {
                let bullet = bullets[i];
                let hitIndex = -1;
                for(let j=0; j<monsters.length; j++) {
                    let mon = monsters[j];
                    if(bullet.x < mon.x + mon.width && bullet.x + bullet.w > mon.x &&
                       bullet.y < mon.y + mon.height && bullet.y + bullet.h > mon.y) {
                        hitIndex = j;
                        break;
                    }
                }
                if(hitIndex !== -1) {
                    let targetMonster = monsters[hitIndex];
                    targetMonster.hp -= 1;
                    bullets.splice(i,1);
                    if(targetMonster.hp <= 0) {
                        // 击杀得分
                        score += targetMonster.points;
                        updateUI();
                        addExplosion(targetMonster.x + targetMonster.width/2, targetMonster.y + targetMonster.height/2);
                        monsters.splice(hitIndex,1);
                    } else {
                        // 命中但未死, 添加小光效
                        addExplosion(targetMonster.x + targetMonster.width/2, targetMonster.y + 10, 4);
                    }
                    i--;
                }
            }
            
            // 动态生成怪兽（基于计数器）
            if(monsterSpawnCounter <= 0) {
                spawnMonster();
                // 动态难度: 分数越高生成越快，但限制最低间隔12帧
                let dynamicDelay = Math.max(16, MONSTER_SPAWN_DELAY_FRAMES - Math.floor(score / 350));
                monsterSpawnCounter = dynamicDelay;
            } else {
                monsterSpawnCounter--;
            }
            
            // 简单难度平衡，随分数增加怪兽速度上限（不超过4.5）
            if(score > 800) baseMonsterSpeed = 3.6;
            else if(score > 400) baseMonsterSpeed = 2.9;
            else baseMonsterSpeed = 2.2;
        }
        
        // ---------- 华丽绘制图形 ----------
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 深邃星空背景 + 动态星星
            ctx.fillStyle = '#030a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<150; i++) {
                if(i%2 === 0) continue;
                ctx.fillStyle = `rgba(255,240,200,${0.3+Math.sin(Date.now()*0.002+i)*0.2})`;
                ctx.fillRect( (i*131)%canvas.width, (i*57)%canvas.height, 2, 2);
            }
            
            // 2. 子弹绘制 (能量光束)
            for(let b of bullets) {
                const grad = ctx.createLinearGradient(b.x, b.y, b.x+b.w, b.y+b.h);
                grad.addColorStop(0, '#ffff80');
                grad.addColorStop(1, '#ffaa44');
                ctx.fillStyle = grad;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffcc44';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = '#fff3aa';
                ctx.fillRect(b.x+1, b.y, b.w-2, b.h);
                ctx.shadowBlur = 0;
            }
            
            // 3. 怪兽绘制 (带眼睛与动态动画)
            for(let m of monsters) {
                // 身体
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.fillStyle = m.color;
                ctx.beginPath();
                ctx.roundRect(m.x, m.y, m.width, m.height, 12);
                ctx.fill();
                // 怪兽花纹
                ctx.fillStyle = '#2d1b1b';
                ctx.beginPath();
                ctx.ellipse(m.x+m.width*0.7, m.y+m.height*0.3, 8, 6, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(m.x+m.width*0.75, m.y+m.height*0.28, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(m.x+m.width*0.73, m.y+m.height*0.26, 2, 0, Math.PI*2);
                ctx.fill();
                // 尖角/角
                ctx.fillStyle = '#a5522b';
                ctx.beginPath();
                ctx.moveTo(m.x+m.width*0.2, m.y-8);
                ctx.lineTo(m.x+m.width*0.35, m.y+2);
                ctx.lineTo(m.x+m.width*0.05, m.y+2);
                ctx.fill();
                // 血量显示(多血怪)
                if(m.maxHp > 1) {
                    ctx.fillStyle = '#dd3333';
                    ctx.fillRect(m.x+5, m.y-12, (m.width-10) * (m.hp/m.maxHp), 6);
                    ctx.fillStyle = '#aa2222';
                    ctx.fillRect(m.x+5, m.y-12, m.width-10, 2);
                }
                // 凶恶眉毛
                ctx.beginPath();
                ctx.strokeStyle = '#6b2e00';
                ctx.lineWidth = 3;
                ctx.moveTo(m.x+m.width*0.2, m.y+m.height*0.22);
                ctx.lineTo(m.x+m.width*0.4, m.y+m.height*0.3);
                ctx.stroke();
                ctx.moveTo(m.x+m.width*0.8, m.y+m.height*0.22);
                ctx.lineTo(m.x+m.width*0.6, m.y+m.height*0.3);
                ctx.stroke();
            }
            
            // 4. 玩家星际战机 (炫酷设计)
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#3cc0ff';
            // 机身
            ctx.fillStyle = '#5fceff';
            ctx.beginPath();
            ctx.moveTo(playerX + PLAYER_WIDTH/2, playerY);
            ctx.lineTo(playerX + PLAYER_WIDTH-8, playerY + PLAYER_HEIGHT-10);
            ctx.lineTo(playerX + PLAYER_WIDTH/2, playerY + PLAYER_HEIGHT);
            ctx.lineTo(playerX + 8, playerY + PLAYER_HEIGHT-10);
            ctx.fill();
            ctx.fillStyle = '#2e9eff';
            ctx.beginPath();
            ctx.rect(playerX+12, playerY+12, PLAYER_WIDTH-24, 18);
            ctx.fill();
            // 机翼
            ctx.fillStyle = '#47c5ff';
            ctx.fillRect(playerX+4, playerY+PLAYER_HEIGHT-16, 8, 12);
            ctx.fillRect(playerX+PLAYER_WIDTH-12, playerY+PLAYER_HEIGHT-16, 8, 12);
            // 驾驶舱光效
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(playerX+PLAYER_WIDTH/2, playerY+15, 7, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#00aeff';
            ctx.beginPath();
            ctx.arc(playerX+PLAYER_WIDTH/2, playerY+15, 4, 0, Math.PI*2);
            ctx.fill();
            // 无敌闪烁 (半透明白光)
            if(invincibleFrames > 0 && (Math.floor(Date.now()/50) % 3 < 1)) {
                ctx.fillStyle = 'rgba(255,255,200,0.7)';
                ctx.beginPath();
                ctx.rect(playerX, playerY, PLAYER_WIDTH, PLAYER_HEIGHT);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            
            // 5. 爆炸特效
            for(let i=0; i<explosions.length; i++) {
                let e = explosions[i];
                let size = 18 * (1 - e.frames/12);
                ctx.fillStyle = `rgba(255, 100, 30, ${1 - e.frames/12})`;
                ctx.beginPath();
                ctx.arc(e.x, e.y, size, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = `rgba(255, 200, 50, ${0.8 - e.frames/12})`;
                ctx.beginPath();
                ctx.arc(e.x-3, e.y-2, size*0.6, 0, Math.PI*2);
                ctx.fill();
                e.frames--;
                if(e.frames <= 0) {
                    explosions.splice(i,1);
                    i--;
                }
            }
            
            // 游戏结束额外蒙层
            if(!gameRunning) {
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 32monospace';
                ctx.fillStyle = '#ffb347';
                ctx.shadowBlur = 0;
                ctx.fillText('💥 GAME OVER 💥', canvas.width/2-150, canvas.height/2-40);
                ctx.font = '18px monospace';
                ctx.fillStyle = '#fff0aa';
                ctx.fillText('点击「重新起飞」继续征战', canvas.width/2-130, canvas.height/2+30);
            }
            
            // 准星光晕
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 12, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(100,200,255,0.2)';
            ctx.fill();
        }
        
        // 辅助方法: Canvas roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // ---------- 鼠标/触摸 控制事件 (支持移动端)----------
        function handlePointerMove(e) {
            if(!gameRunning && playerHP<=0) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(canvasX, 0), canvas.width);
            canvasY = Math.min(Math.max(canvasY, 0), canvas.height);
            mouseX = canvasX;
            mouseY = canvasY;
        }
        
        function preventScroll(e) {
            if(e.cancelable) e.preventDefault();
        }
        
        // 动画循环
        let lastTimestamp = 0;
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 绑定事件与初始化
        function init() {
            resetGame();
            // 鼠标控制
            canvas.addEventListener('mousemove', handlePointerMove);
            canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
            canvas.addEventListener('touchstart', preventScroll);
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            // 重启逻辑
            restartBtn.addEventListener('click', () => {
                resetGame();
                // 重置所有数据后重新开始
                gameRunning = true;
                playerHP = 3;
                score = 0;
                bullets = [];
                monsters = [];
                explosions = [];
                invincibleFrames = 0;
                shootCooldown = 0;
                monsterSpawnCounter = 5;
                updateUI();
                gameStateSpan.innerText = '🚀 重新升空！歼灭怪兽！';
            });
            gameLoop();
        }
        
        init();
    })();
</script>
</body>
</html>
